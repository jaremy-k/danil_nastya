server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    location ~* \.(?:css|js|png|jpg|jpeg|gif|webp|svg|ico|otf|ttf|woff|woff2|ics)$ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }
}
